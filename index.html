<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAGER LIVE</title>
    <style>
        :root { --bg: #FAF6E1; --accent: #E4D96F; }
        body { background: #eee; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .frame { background: var(--bg); border: 4px solid var(--accent); width: 85%; max-width: 340px; padding: 25px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }
        .time-row { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 900; color: rgba(0, 0, 0, 0.2); font-size: 1.1rem; }
        #display { min-height: 120px; font-weight: 700; text-transform: uppercase; cursor: pointer; color: #333; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; text-align: center; overflow-wrap: anywhere; line-height: 1.2; }
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding: 20px; }
        .overlay.active { display: flex; }
        #input { flex: 1; border: 3px solid var(--accent); border-radius: 15px; padding: 15px; font-size: 1.2rem; outline: none; resize: none; background: #fff; }
        .btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        #log { font-size: 10px; color: red; margin-top: 5px; height: 15px; opacity: 0.5; overflow: hidden; }
    </style>
</head>
<body>

<div class="frame">
    <div class="time-row"><div id="date">00.00.00</div><div id="time">00:00</div></div>
    <div id="display">ЗАГРУЗКА...</div>
    <div id="log"></div>
    <div style="font-size: 0.7rem; color: #aaa; margin-top: 10px; text-transform: uppercase;">Тап — Обновить / Зажать — Писать</div>
</div>

<div class="overlay" id="overlay">
    <textarea id="input" placeholder="СООБЩЕНИЕ..."></textarea>
    <div class="btns">
        <button class="btn" style="background:#ddd" onclick="toggle()">НАЗАД</button>
        <button class="btn" style="background:var(--accent);color:#000" onclick="send()">В ЭФИР</button>
    </div>
</div>

<script>
    const PROJECT_URL = "https://supabase.co"; 
    const KEY = "sb_publishable_DArGTwAvQs-vJlD9sxxv8A_ZBZ38TbH";
    const BASE_URL = `${PROJECT_URL}/rest/v1/messages`;

    const display = document.getElementById('display');
    const log = document.getElementById('log');
    const input = document.getElementById('input');
    let timer;

    async function api(method, body = null) {
        log.innerText = "";
        const headers = {
            "apikey": KEY,
            "Authorization": `Bearer ${KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
        };
        
        let url = method === 'GET' ? `${BASE_URL}?select=content&order=created_at.desc&limit=1` : BASE_URL;

        try {
            const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.message || "ОШИБКА");
            }
            return await res.json();
        } catch (e) {
            log.innerText = "Error: " + e.message;
            throw e;
        }
    }

    async function load() {
        display.style.opacity = "0.4";
        try {
            const data = await api('GET');
            if (data && data.length > 0) {
                // ИСПРАВЛЕНО: Добавлен индекс [0]
                display.innerText = data[0].content; 
            } else {
                display.innerText = "ЭФИР ПУСТ";
            }
        } catch (e) {
            display.innerText = "СЕТЬ OFF";
        }
        display.style.opacity = "1";
    }

    async function send() {
        const val = input.value.trim().toUpperCase();
        if (!val) return;
        toggle();
        display.innerText = "СИГНАЛ...";
        try {
            await api('POST', { content: val });
            input.value = "";
            setTimeout(load, 1000); 
        } catch (e) {
            display.innerText = "СБОЙ";
        }
    }

    function toggle() { 
        document.getElementById('overlay').classList.toggle('active'); 
        if(document.getElementById('overlay').classList.contains('active')) input.focus();
    }

    const start = (e) => { timer = setTimeout(() => { timer = null; toggle(); }, 600); };
    const end = (e) => { if (timer) { clearTimeout(timer); load(); } };

    display.onmousedown = display.ontouchstart = start;
    display.onmouseup = display.ontouchend = end;

    function updateTime() {
        const now = new Date();
        document.getElementById('date').innerText = now.toLocaleDateString('ru-RU');
        document.getElementById('time').innerText = now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
    }

    setInterval(updateTime, 1000);
    updateTime();
    load();
</script>
</body>
</html>
