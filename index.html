<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOTILER</title>
    <style>
        body { background: #f4f4f4; font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; user-select: none; -webkit-user-select: none; }
        
        .frame { 
            background: radial-gradient(circle, #FAF6E1 0%, #F5F0D5 100%); 
            border: 3px solid #E4D96F; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px 14px; border-radius: 26px; 
            box-shadow: inset 0 0 15px rgba(228, 217, 111, 0.2), 0 8px 20px rgba(0,0,0,0.06); 
            position: relative; overflow: hidden; 
            width: 95%; max-width: 360px; box-sizing: border-box;
        }

        .watermark { position: absolute; font-size: 8rem; font-weight: 900; color: #E4D96F; opacity: 0.12; z-index: 0; top: 50%; left: 50%; transform: translate(-50%, -50%) perspective(400px) rotateX(20deg) rotateY(-10deg); letter-spacing: 15px; pointer-events: none; white-space: nowrap; }

        .time-row { display: flex; width: 100%; justify-content: space-between; align-items: center; z-index: 2; height: 2.8rem; }
        
        .current-date { color: rgba(100, 90, 80, 0.25); font-size: 2.5rem; font-weight: 900; letter-spacing: -3px; line-height: 1; }
        .current-time { color: rgba(90, 85, 80, 0.5); font-size: 2.5rem; font-weight: 900; line-height: 1; letter-spacing: -1px; }

        #message { font-size: 0.75rem; color: rgba(0, 0, 0, 0.6); font-weight: 600; width: 100%; text-align: justify; text-align-last: justify; text-transform: uppercase; letter-spacing: 3px; margin: 12px 0 16px 0; z-index: 2; opacity: 0.8; }

        .dots { display: flex; justify-content: space-between; width: 100%; gap: 6px; z-index: 2; }
        .dot { flex-grow: 1; height: 4px; background: rgba(0, 0, 0, 0.04); border-radius: 2px; }
        .dot.active { background: #E4D96F; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="frame">
        <div class="watermark">TOT</div>
        
        <div class="time-row">
            <div class="current-date" id="d-date">00.00.00</div>
            <div class="current-time" id="d-time">00:00</div>
        </div>

        <div id="message">СИНХРОНИЗАЦИЯ</div>

        <div class="dots" id="d-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

<script>
    const dictionary = ["СВЯЗЬ", "ПОТОК", "МИР", "ВРЕМЯ", "ЖДИ", "ИДУ", "СВОБОДА", "ПУЛЬС"];
    let lastMinute = -1;

    function update() {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();

        // 1. Обновление Даты и Времени (Гарантированно работает)
        const dateStr = now.getDate().toString().padStart(2, '0') + '.' + (now.getMonth() + 1).toString().padStart(2, '0') + '.' + now.getFullYear().toString().slice(-2);
        const timeStr = h.toString().padStart(2, '0') + ':' + m.toString().padStart(2, '0');
        
        document.getElementById('d-date').innerText = dateStr;
        document.getElementById('d-time').innerText = timeStr;

        // 2. Смена слова раз в минуту
        if (m !== lastMinute) {
            const cycleMin = Math.floor((Date.now() / 60000) % 360);
            document.getElementById('message').innerText = dictionary[cycleMin % dictionary.length];
            lastMinute = m;

            // 3. Обновление точек цикла (один раз в минуту)
            const progress = Math.floor(((h * 60 + m) % 360) / 90);
            const dots = document.getElementById('d-dots').children;
            for (let i = 0; i < dots.length; i++) {
                dots[i].className = i <= progress ? 'dot active' : 'dot';
            }
        }
    }

    // Запуск без задержек
    setInterval(update, 1000);
    update();
</script>
</body>
</html>
